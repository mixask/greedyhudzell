<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Hudzell - Roblox Scripts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(16px); }
        .neon-text { text-shadow: 0 0 15px #22d3ee, 0 0 30px #22d3ee; }
        .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <nav class="border-b border-zinc-800 bg-zinc-950/90 backdrop-blur-md fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500 rounded-2xl flex items-center justify-center text-black font-bold text-3xl logo-font">GH</div>
                <div class="text-3xl font-bold logo-font tracking-tighter neon-text">GREEDY HUDZELL</div>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#home" class="hover:text-cyan-400">Главная</a>
                <a href="#script" class="hover:text-cyan-400">Скрипт</a>
                <a href="#games" class="hover:text-cyan-400">Игры</a>
                <a href="#downloads" class="hover:text-cyan-400">Скачать</a>
                <a href="#discord" class="hover:text-cyan-400">Discord</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="https://api.greedyhudzell.com" target="_blank" class="text-xs px-4 py-2 border border-zinc-700 rounded-xl hover:bg-zinc-800">API</a>
                <a href="https://bot.greedyhudzell.com" target="_blank" class="text-xs px-4 py-2 border border-zinc-700 rounded-xl hover:bg-zinc-800">Bot</a>
                <button onclick="showLogin()" class="px-6 py-2 text-sm font-semibold border border-cyan-500 text-cyan-400 rounded-2xl hover:bg-cyan-500 hover:text-black">Войти</button>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-bg min-h-screen pt-24 flex items-center">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <div class="inline-flex items-center gap-3 bg-emerald-500/10 text-emerald-400 px-5 py-2 rounded-3xl border border-emerald-500/30">
                    <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span>🟢 Бот онлайн • Скрипт работает</span>
                </div>
                <h1 class="text-7xl font-bold logo-font tracking-tighter leading-none neon-text">GREEDY<br>HUDZELL</h1>
                <p class="text-2xl text-zinc-400">Лучший скрипт для Parkour Legacy</p>
                <div class="flex gap-4">
                    <button onclick="downloadScript()" class="px-10 py-6 bg-gradient-to-r from-cyan-500 to-teal-400 text-black font-bold rounded-3xl">Скачать</button>
                    <button onclick="connectDiscord()" class="px-10 py-6 border-2 border-[#5865F2] text-[#5865F2] rounded-3xl">Discord Bot</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function downloadScript() {
            window.open('raw-script.lua', '_blank');
        }
        function connectDiscord() {
            window.open('https://discord.gg/example', '_blank');
            setTimeout(() => alert('Команда !verify отправлена боту!'), 800);
        }
        function showLogin() {
            alert('Вход через Discord (демо)');
        }
    </script>
</body>
</html>
